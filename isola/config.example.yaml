# Isola 配置示例。复制为 config.yaml 后填写。
# 安全：api_key 一律用 *_api_key_env 指向环境变量名，绝不在此明文写 api_key。
judge:
  type: openai_compat
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  api_key_env: JUDGE_API_KEY        # 读取环境变量 JUDGE_API_KEY 作为判定器密钥
  # —— 无 key 选项（U1）：不想配 LLM 判定器时，把上面整个 judge 段换成下面之一 ——
  # 手动/离线（route 一律转确认，归属交 agent/用户；isola-mcp 可无 key 启动）：
  #   judge: { type: manual }
  # 用已登录的本地 CLI agent 当判定器（无 key 自动归属）：
  #   judge: { type: cli, command: "claude -p" }    # command 换成你已登录的任意 CLI agent 命令即可
harness:
  type: llm_direct                  # 可选: openclaw（走 OpenClaw CLI）
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  api_key_env: HARNESS_API_KEY
channel:
  type: cli
store:
  path: "~/.isola/isola.db"   # SQLite 真相源；~ 会展开
isolation_s: 300                    # 隔离期（秒）：高置信先投递、到期才落定记忆
projects:                           # 初始项目（首次播种；之后以注册表为权威）。须有稳定 id（从 1 连续）
  - {id: 1, name: "示例项目A", desc: "项目A的目标导向描述（用于归属判定）", status: active}
  - {id: 2, name: "示例项目B", desc: "项目B的目标导向描述", status: active}
